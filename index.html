<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>梁颖 · 很美</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

body {
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow: hidden;
}

.card {
  background: white;
  border-radius: 30px;
  padding: 50px 45px;
  box-shadow: 0 15px 50px rgba(236, 64, 122, 0.25);
  text-align: center;
  max-width: 500px;
  animation: fadeIn 1.2s ease-out;
  position: relative;
  z-index: 2;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.avatar {
  width: 160px;
  height: 160px;
  margin: 0 auto 25px;
  border-radius: 50%;
  background: #f8bbd0;
  overflow: hidden;
  border: 4px solid #fff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.name {
  font-size: 50px;
  color: #e91e63;
  margin-bottom: 20px;
  font-weight: bold;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 12px rgba(233,30,99,0.3); }
  to { text-shadow: 0 0 25px rgba(233,30,99,0.6); }
}

.desc {
  font-size: 23px;
  color: #444;
  line-height: 1.8;
  margin-bottom: 25px;
}

.heart {
  font-size: 35px;
  color: #e91e63;
  animation: beat 1.4s infinite;
}

@keyframes beat {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.18); }
}

/* 花瓣飘落 */
.petal {
  position: absolute;
  color: #fff;
  font-size: 18px;
  pointer-events: none;
  animation: fall linear infinite;
  z-index: 1;
}

@keyframes fall {
  0% {
    transform: translateY(-10vh) rotate(0deg);
    opacity: 0;
  }
  10% { opacity: 1; }
  100% {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>
<div class="card">
  <div class="avatar">
    <!-- 把下面 src 换成梁颖的照片链接就能显示 -->
    <img src="https://www.imgur.la/images/2026/03/01/liangying.jpg" alt="梁颖">
  </div>

  <h1 class="name">梁颖</h1>
  <p class="desc">
    眉眼温柔，气质动人，笑起来像星光一样<br>
    温柔又好看，让人一眼就心动。
  </p >
  <div class="heart">💖</div>
</div>

<script>
// 花瓣飘落
function createPetal() {
  const petal = document.createElement('div');
  petal.classList.add('petal');
  petal.textContent = '❀';
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.animationDuration = (Math.random() * 3 + 4) + 's';
  petal.style.fontSize = (Math.random() * 15 + 12) + 'px';
  document.body.appendChild(petal);
  setTimeout(() => petal.remove(), 7000);
}
setInterval(createPetal, 300);
</script>
</body>
</html>
